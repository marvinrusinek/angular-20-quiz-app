<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 460" role="img"
     aria-label="An RxJS marble diagram: an input stream of values transformed by map into an output stream">
  <defs>
    <marker id="rx-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d3d3d"/>
    </marker>
    <style>
      .stream { stroke:#3d3d3d; stroke-width:2.5; fill:none; }
      .marble { stroke:#ffffff; stroke-width:2.5; }
      .b1 { fill:#42a5f5; } .b2 { fill:#66bb6a; } .b3 { fill:#ffa726; }
      .mval  { font-family:'Segoe UI',Roboto,Arial,sans-serif; fill:#ffffff; font-weight:700;
               font-size:15px; text-anchor:middle; dominant-baseline:middle; }
      .op    { fill:#ffffff; stroke:#dd0031; stroke-width:2.5; }
      .opt   { font-family:'Consolas',Menlo,monospace; fill:#dd0031; font-size:18px;
               font-weight:700; text-anchor:middle; dominant-baseline:middle; }
      .flow  { stroke:#dd0031; stroke-width:2.5; fill:none; }
      .title { font-family:'Segoe UI',Roboto,Arial,sans-serif; font-weight:700; fill:#1a1a1a;
               font-size:22px; text-anchor:middle; }
      .sub   { font-family:'Segoe UI',Roboto,Arial,sans-serif; fill:#6b6b6b; font-size:13px; text-anchor:middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="620" height="460" fill="#fafafa"/>

  <!-- Title -->
  <text class="title" x="310" y="44">RxJS</text>
  <text class="sub"   x="310" y="66">Streams of values over time, transformed by operators</text>

  <!-- Input stream -->
  <line class="stream" marker-end="url(#rx-arrow)" x1="70" y1="150" x2="552" y2="150"/>
  <circle class="marble b1" cx="170" cy="150" r="20"/><text class="mval" x="170" y="150">1</text>
  <circle class="marble b2" cx="300" cy="150" r="20"/><text class="mval" x="300" y="150">2</text>
  <circle class="marble b3" cx="430" cy="150" r="20"/><text class="mval" x="430" y="150">3</text>

  <!-- Operator -->
  <rect class="op" x="195" y="205" width="230" height="56" rx="12"/>
  <text class="opt" x="310" y="234">map(x =&gt; x * 10)</text>
  <path class="flow" marker-end="url(#rx-arrow)" d="M310 178 L310 203"/>
  <path class="flow" marker-end="url(#rx-arrow)" d="M310 263 L310 288"/>

  <!-- Output stream -->
  <line class="stream" marker-end="url(#rx-arrow)" x1="70" y1="315" x2="552" y2="315"/>
  <circle class="marble b1" cx="170" cy="315" r="22"/><text class="mval" x="170" y="315">10</text>
  <circle class="marble b2" cx="300" cy="315" r="22"/><text class="mval" x="300" y="315">20</text>
  <circle class="marble b3" cx="430" cy="315" r="22"/><text class="mval" x="430" y="315">30</text>

  <text class="sub" x="310" y="380">A subscriber receives 10, then 20, then 30 &#8212; over time</text>
</svg>
