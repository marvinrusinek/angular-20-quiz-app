@if (currentQuestion(); as q) {
  <div class="interview-session">
    <header class="interview-session__bar">
      <h1 class="interview-session__title" i18n>Interview</h1>
      <!-- Total-countdown timer lands in the next milestone. -->
      <codelab-theme-toggle class="interview-session__theme" />
    </header>

    <!-- Question box. Order: question heading → options → pagination. -->
    <div class="interview-question-box">
      <!-- Question text rendered directly (deferred feedback → always the
           question text, never the FET, never empty). -->
      <h3
        class="interview-question"
        aria-live="polite"
        aria-atomic="true"
        [innerHTML]="questionText()"
      ></h3>

      <app-interview-options
        [options]="currentOptions()"
        [selectedIds]="selectedIds()"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>

    <app-interview-paginator
      [total]="total()"
      [currentIndex]="currentIndex()"
      [answered]="answeredIndices()"
      (select)="onNavigate($event)"
    />

    <footer class="interview-session__footer">
      <span class="interview-session__progress">
        {{ answeredIndices().size }} / {{ total() }} <span i18n>answered</span>
      </span>
      <!-- Submit + confirmation dialog land in the next milestone. -->
    </footer>
  </div>
} @else {
  <p class="loading-message" role="status" aria-live="polite">
    Preparing interview&hellip; (questions loaded: {{ total() }})
  </p>
}
