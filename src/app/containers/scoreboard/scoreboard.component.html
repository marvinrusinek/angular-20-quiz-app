<mat-card>
  <mat-card-content>
    <main class="scoreboard">
      <codelab-scoreboard-score class="scoreboard__score" />

      @if (badgeText(); as text) {
        <span class="scoreboard__badge" i18n role="status">
          <span class="badge-q">Q</span>
          <span class="badge-current">{{ badgeparts()[0] }}</span>
          <span class="badge-of">of</span>
          <span class="badge-total">{{ badgeparts()[1] }}</span>
        </span>
      }

      <codelab-scoreboard-timer class="scoreboard__timer" />
    </main>
  </mat-card-content>
</mat-card>
