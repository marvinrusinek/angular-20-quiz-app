<div class="summary-icons">
  <div class="print">
    <a
      matTooltip="Print"
      i18n-matTooltip
      aria-label="Print"
      i18n-aria-label
      href="javascript:window.print()"
    >
      <i class="material-icons">print</i>
    </a>
  </div>
  <div class="email">
    <a
      target="_blank"
      matTooltip="E-mail"
      i18n-matTooltip
      aria-label="E-mail"
      i18n-aria-label
      [href]="mailtoHref()"
    >
      <i class="material-icons">email</i>
    </a>
  </div>
  <div class="share">
    <a
      target="_blank"
      matTooltip="Share on Twitter"
      i18n-matTooltip
      aria-label="Share on Twitter"
      i18n-aria-label
      [href]="twitterHref()"
    >
      <i class="material-icons">share</i>
    </a>
  </div>
</div>
