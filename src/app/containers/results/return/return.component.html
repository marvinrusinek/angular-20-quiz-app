<section class="return">
  <mat-card-actions>
    <mat-nav-list>
      <a
        class="btn hvr-radial-out mdc-button mdc-button--outlined"
        title="restart"
        i18n-title
        (click)="restartQuiz()"
      >
        <div class="mdc-button__ripple"></div>
        <i class="material-icons mdc-button__icon" aria-hidden="true"
          >power_settings_new</i
        >&nbsp;&nbsp;
        <span class="mdc-button__label"><strong i18n>Restart Quiz</strong></span>
      </a>
      <a
        class="btn hvr-radial-out mdc-button mdc-button--outlined"
        title="select quiz"
        i18n-title
        (click)="selectQuiz()"
      >
        <div class="mdc-button__ripple"></div>
        <i class="material-icons mdc-button__icon" aria-hidden="true"
          >select_all</i
        >&nbsp;&nbsp;
        <span class="mdc-button__label"><strong i18n>Select Quiz</strong></span>
      </a>
      <a
        class="btn hvr-radial-out mdc-button mdc-button--outlined"
        title="back to Codelab"
        i18n-title
        [href]="codelabUrl"
      >
        <div class="mdc-button__ripple"></div>
        <i class="material-icons mdc-button__icon" aria-hidden="true">laptop</i
        >&nbsp;&nbsp;
        <span class="mdc-button__label"><strong i18n>Back to Codelab</strong></span>
      </a>
    </mat-nav-list>
  </mat-card-actions>
</section>
