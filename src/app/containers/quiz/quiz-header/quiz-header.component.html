<mat-card-header>
  <a
    [routerLink]="['/select']"
    matTooltip="Back to Codelab Quiz Selection"
    i18n-matTooltip
    matTooltipPosition="left"
  >
    <img
      mat-card-avatar
      class="header-image"
      loading="lazy"
      alt="Quiz Header Image"
      ngSrc="assets/images/codelab_logo.jpeg"
      width="150"
      height="84"
    />
  </a>

  @if (currentQuiz(); as currentQuiz) {
    <div class="header-titles">
      <mat-card-title i18n>
        {{ currentQuiz?.milestone || 'No questions found' }} Quiz
      </mat-card-title>

      <mat-card-subtitle i18n>
        Assess your knowledge of
        {{ currentQuiz?.milestone || 'No questions found' }}
      </mat-card-subtitle>
    </div>
  }

  <div class="header-actions">
    <button
      type="button"
      class="keyboard-shortcuts-btn"
      (click)="openKeyboardShortcuts()"
      matTooltip="Keyboard shortcuts"
      i18n-matTooltip
      matTooltipPosition="below"
      aria-label="Open keyboard shortcuts"
      i18n-aria-label
    >
      <mat-icon>keyboard</mat-icon>
    </button>

    <codelab-theme-toggle />
  </div>
</mat-card-header>
