@if (isMultiSelect()) {
  <p class="io-hint" i18n>Select all that apply.</p>
}

<ul class="io-list" role="group" aria-label="Answer options" i18n-aria-label>
  @for (option of displayOptions(); track option.optionId) {
    <li>
      <label class="option-row io-option" [class.io-selected]="isSelected(option)">
        <input
          class="io-input"
          [type]="isMultiSelect() ? 'checkbox' : 'radio'"
          name="interview-answer"
          [checked]="isSelected(option)"
          (change)="onToggle(option)"
        />
        <!-- Plain-text interpolation, consistent with the topic-quiz options
             (option-item.component.html). innerHTML here would parse literal
             tags in the option (e.g. "<div>") as elements and drop them. -->
        <span class="io-text">{{ option.text }}</span>
      </label>
    </li>
  }
</ul>
