<form [formGroup]="questionForm" (ngSubmit)="onSubmit()">
  <!-- Dynamic component container -->
  <div #dynamicAnswerContainer></div>

  <!-- Loading spinner -->
  @if (isLoading) {
    <div class="loading-spinner" aria-label="Loading">
      <!-- spinner here -->
    </div>
  }
</form>

<!-- Inline options renderer (signal-driven, replaces dynamic-only path) -->
@if (currentQuestion() && optionsToDisplay().length) {
  <codelab-question-answer
    [questionData]="currentQuestion()!"
    [optionsToDisplay]="optionsToDisplay()"
    [currentQuestionIndex]="currentQuestionIndex()"
    (optionClicked)="onOptionClicked($any($event))">
  </codelab-question-answer>
}
