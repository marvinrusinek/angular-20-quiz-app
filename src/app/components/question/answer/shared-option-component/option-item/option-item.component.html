<div class="option-cursor-wrapper" [class.cursor-not-allowed]="getOptionCursor() === 'not-allowed'"
  [attr.data-option-id]="b.option.optionId">
  @if (type === 'single') {
  <mat-radio-button class="option-row single-option" appHighlightOption [appHighlightInputType]="'radio'"
    [appHighlightReset]="shouldResetBackground" [sharedOptionConfig]="sharedOptionConfig" [optionBinding]="b"
    [option]="b.option" [isSelected]="b.isSelected"
    [value]="i"
    [ngClass]="getOptionClasses()" [style.background-color]="getOptionBackgroundColor()" [disabled]="isDisabled()"
    [disableRipple]="true" (change)="onChanged($event)"
    [attr.data-option-id]="b.option.optionId">
    <ng-container *ngTemplateOutlet="optionContent"></ng-container>
  </mat-radio-button>
  } @else {
  <mat-checkbox class="option-row multiple-option" appHighlightOption [appHighlightInputType]="'checkbox'"
    [appHighlightReset]="shouldResetBackground" [sharedOptionConfig]="sharedOptionConfig" [optionBinding]="b"
    [option]="b.option" [isSelected]="b.isSelected" [checked]="b.isSelected" [ngClass]="getOptionClasses()"
    [style.background-color]="getOptionBackgroundColor()" [disabled]="isDisabled()" [disableRipple]="true"
    (change)="onChanged($event)" [attr.data-option-id]="b.option.optionId">
    <ng-container *ngTemplateOutlet="optionContent"></ng-container>
  </mat-checkbox>
  }
</div>

<ng-template #optionContent>
  <div class="option-wrapper" (click)="onContentClick($event)">
    <span class="option-text">
      {{ getOptionDisplayText() }}
    </span>

    @if (shouldShowIcon(b.option, i)) {
      <mat-icon class="opt-icon">
        {{ getOptionIcon(b.option, i) }}
      </mat-icon>
    }
  </div>
</ng-template>
