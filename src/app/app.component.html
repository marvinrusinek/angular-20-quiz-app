<main>
  <!-- Brief "starting the quiz" overlay — fades in on Start, fades out into Q1. -->
  <div
    class="start-spinner"
    [class.is-visible]="startSpinner.visible()"
    role="status"
    aria-live="polite"
  >
    <div class="start-spinner__box">
      <app-google-spinner />
      <span class="start-spinner__label">{{ startSpinner.label() }}</span>
    </div>
  </div>

  <router-outlet></router-outlet>
</main>
